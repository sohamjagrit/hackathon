<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miles — your trip, spoken into being</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Instrument Sans', sans-serif; background: oklch(0.97 0.012 75); }
      @keyframes pulse { 0%{ box-shadow:0 0 0 0 rgba(58,110,94,.35);} 70%{ box-shadow:0 0 0 14px rgba(58,110,94,0);} 100%{ box-shadow:0 0 0 0 rgba(58,110,94,0);} }
      @keyframes fadeUp { from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }
      @keyframes bar1 { 0%,100%{ height:6px; } 50%{ height:20px; } }
      @keyframes bar2 { 0%,100%{ height:16px; } 50%{ height:6px; } }
      @keyframes bar3 { 0%,100%{ height:10px; } 50%{ height:22px; } }
      @keyframes dotBounce { 0%,80%,100%{ transform:translateY(0); opacity:.4 } 40%{ transform:translateY(-4px); opacity:1 } }
      @keyframes captionIn { from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }
      @keyframes spin { to{ transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
